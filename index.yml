# =====================================================================
#  Konfigurasi Decap CMS untuk Toko E-book
#  Ganti bagian bertanda  <<< GANTI  sesuai data Anda
# =====================================================================

backend:
  name: github
  repo: USERNAME/NAMA-REPO          # <<< GANTI  contoh: budi/toko-ebook
  branch: main                      # sesuaikan jika branch Anda bukan "main"
  base_url: https://OAUTH-ANDA.workers.dev   # <<< GANTI  URL helper login (lihat langkah 4)

# Tempat menyimpan gambar cover (boleh publik, jadi aman di dalam repo)
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "ebook"
    label: "Produk E-book"
    label_singular: "E-book"
    description: "Tambah atau ubah produk e-book yang dijual"
    folder: "_produk"               # tiap produk jadi 1 file di folder ini
    create: true                    # izinkan menambah produk baru
    slug: "{{slug}}"
    summary: "{{judul}} — Rp {{harga_jual}}"
    fields:
      - { name: "judul", label: "Judul E-book", widget: "string" }

      - name: "kategori"
        label: "Kategori / Niche"
        widget: "select"
        options: ["Bisnis Online", "Pengembangan Diri", "Keuangan"]

      - { name: "cover", label: "Cover E-book", widget: "image" }

      - { name: "headline", label: "Headline (Hero)", widget: "string" }
      - { name: "subheadline", label: "Sub-headline / janji utama", widget: "text" }

      - name: "pain_points"
        label: "3 Pain Points"
        widget: "list"
        hint: "Masalah utama yang dihadapi pembaca"
        field: { name: "poin", label: "Poin", widget: "string" }

      - name: "daftar_bab"
        label: "Daftar Bab / Isi"
        widget: "list"
        field: { name: "bab", label: "Bab", widget: "string" }

      - { name: "bonus", label: "Bonus (opsional)", widget: "text", required: false }

      - { name: "harga_normal", label: "Harga normal (dicoret)", widget: "number", value_type: "int", required: false }
      - { name: "harga_jual", label: "Harga jual", widget: "number", value_type: "int" }

      # PENTING: file e-book TIDAK disimpan di sini (repo bersifat publik).
      # Cukup tempel link checkout dari layanan pembayaran Anda.
      - name: "link_checkout"
        label: "Link checkout (layanan bayar)"
        widget: "string"
        hint: "URL halaman pembayaran e-wallet/QRIS untuk produk ini"

      - { name: "garansi", label: "Aktifkan garansi 30 hari", widget: "boolean", default: true }

      - name: "status"
        label: "Status produk"
        widget: "select"
        options: ["Aktif", "Draft", "Arsip"]
        default: "Draft"
